server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: expense-tracker-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:expense_tracker}?${DB_PARAMS:useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
  model: ${OLLAMA_MODEL:llama3.1:8b}

logging:
  level:
    com.nishen.expense: ${APP_LOG_LEVEL:INFO}
    org.springframework.web: ${SPRING_WEB_LOG_LEVEL:WARN}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] requestId=%X{requestId:-} %logger{36} - %msg%n"
